name: vm-manager

on:
  push:
    branches: [main]
    paths:
      - 'k8s/vm-manager/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./k8s/vm-manager/backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vm-manager-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./k8s/vm-manager/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vm-manager-frontend:latest