apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/algertislamaj/k8s-apps
    targetRevision: HEAD
    path: k8s/dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard
  syncPolicy:
    automated:
      prune: false
      selfHeal: true