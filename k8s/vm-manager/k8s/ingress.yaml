apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vm-manager
  namespace: vm-manager
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: vm-manager.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: vm-manager-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vm-manager-frontend
            port:
              number: 80