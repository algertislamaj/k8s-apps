apiVersion: v1
kind: PersistentVolume
metadata:
  name: vm-manager-postgres-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /data/vm-manager/postgres   # will be created on the node
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vm-manager-postgres-pvc
  namespace: vm-manager
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: vm-manager-postgres-secret
  namespace: vm-manager
type: Opaque
stringData:
  POSTGRES_DB: vmmanager
  POSTGRES_USER: vmmanager
  POSTGRES_PASSWORD: changeme123   # change this
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: vm-manager-postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: vm-manager-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vm-manager
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432