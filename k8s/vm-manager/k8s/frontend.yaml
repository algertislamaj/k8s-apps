apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-manager-frontend
  namespace: vm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm-manager-frontend
  template:
    metadata:
      labels:
        app: vm-manager-frontend
    spec:
      containers:
        - name: frontend
          image: algertislamaj/vm-manager-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vm-manager-frontend
  namespace: vm-manager
spec:
  selector:
    app: vm-manager-frontend
  ports:
    - port: 80
      targetPort: 80